# ABOBA GHOST CONFIG
proxies:
  - name: "Aboba-Vatican"
    type: socks5
    server: 1.2.16.2
    port: 1080

rules:
  - DOMAIN-KEYWORD,supercell,Aboba-Vatican
  - DOMAIN-KEYWORD,brawlstars,Aboba-Vatican
  - GEOIP,CN,DIRECT
  - FINAL,Aboba-Vatican

dns:
  enable: true
  ipv6: false
  default-nameserver: [8.8.8.8, 1.1.1.1]
  nameserver: [1.2.16.2]
